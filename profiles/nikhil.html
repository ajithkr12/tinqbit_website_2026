<!doctype html>

      name="description"
      content="Digital business card for Nikhil A, CEO & Co-Founder of Tinqbit."
    />

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nikhil A">
    <link rel="apple-touch-icon" href="/assets/favicon.png">
    <meta name="theme-color" content="#0b1929">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0b1929;
        --surf: rgba(255, 255, 255, 0.05);
        --border: rgba(69, 191, 229, 0.15);
        --accent: #45bfe5;
        --mid: #1490c8;
        --text: #eef5fa;
        --muted: rgba(238, 245, 250, 0.5);
        --grad: linear-gradient(135deg, #1490c8, #45bfe5);
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        margin: 0%;
        padding: 0%;
      }

      body {
        background: var(--bg);
        font-family: "Sora", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: radial-gradient(
          rgba(69, 191, 229, 0.07) 1px,
          transparent 1px
        );
        background-size: 26px 26px;
        pointer-events: none;
        z-index: 0;
      }

      /* ── Card: exact device dimensions ── */
      .card {
        position: relative;
        z-index: 1;
        width: 100vw;
        max-width: 560px;
        height: 100svh;
        max-height: 100svh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Logo — top-left corner over photo ── */
      .card-logo {
        position: absolute;
        top: env(safe-area-inset-top, 1rem);
        left: 0;
        right: 0;
        padding: 1rem 1.25rem 0;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        z-index: 10;
      }

      .card-logo img {
        height: 24px;
        width: auto;
        filter: brightness(0) invert(1);
        opacity: 0.85;
      }

      .card-logo-name {
        font-family: "Manrope", sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        color: rgba(238, 245, 250, 0.55);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      /* ── Photo — fills remaining space ── */
      .card-photo {
        flex: 1;
        position: relative;
        overflow: hidden;
        min-height: 0;
      }

      .card-photo img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top center;
        display: block;
      }

      .card-photo::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(11, 25, 41, 0.35) 0%,
          transparent 28%,
          rgba(11, 25, 41, 0.5) 62%,
          #0b1929 100%
        );
      }

      /* ── Name / title at bottom of photo ── */
      .card-identity {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 1.5rem 1.25rem 1.2rem;
        z-index: 2;
      }

      .card-name {
        font-family: "Manrope", sans-serif;
        font-size: clamp(1.75rem, 7.5vw, 2.2rem);
        font-weight: 800;
        color: var(--text);
        line-height: 1.05;
        letter-spacing: -0.025em;
      }

      .card-title {
        font-family: "Sora", sans-serif;
        font-size: 0.85rem;
        font-weight: 400;
        color: var(--accent);
        margin-top: 0.25rem;
      }

      /* ── Body — fixed, compact ── */
      .card-body {
        flex-shrink: 0;
        padding: 0.5rem 1rem
          calc(env(safe-area-inset-bottom, 0.75rem) + 0.75rem);
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        background: var(--bg);
      }

      /* ── Contact rows ── */
      .contact-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.65rem 0.85rem;
        background: var(--surf);
        border: 1px solid var(--border);
        border-radius: 13px;
        text-decoration: none;
        color: var(--text);
        transition:
          background 0.15s,
          border-color 0.15s;
        -webkit-tap-highlight-color: transparent;
      }

      .contact-row:active {
        background: rgba(69, 191, 229, 0.1);
        border-color: rgba(69, 191, 229, 0.3);
      }

      .c-icon {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .c-icon.ph {
        background: linear-gradient(135deg, #059669, #0d9488);
      }
      .c-icon.wa {
        background: linear-gradient(135deg, #25d366, #128c7e);
      }
      .c-icon.em {
        background: linear-gradient(135deg, #1490c8, #45bfe5);
      }
      .c-icon.li {
        background: linear-gradient(135deg, #0a66c2, #0077b5);
      }
      .c-icon.web {
        background: linear-gradient(135deg, #7c3aed, #6d28d9);
      }

      .c-text {
        min-width: 0;
        flex: 1;
      }

      .c-label {
        font-size: 0.62rem;
        color: var(--muted);
        letter-spacing: 0.07em;
        text-transform: uppercase;
        line-height: 1;
        margin-bottom: 0.12rem;
      }

      .c-value {
        font-family: "Manrope", sans-serif;
        font-size: 0.86rem;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .c-arrow {
        color: var(--muted);
        flex-shrink: 0;
      }

      /* ── Actions ── */
      .card-actions {
        display: flex;
        gap: 0.55rem;
        margin-top: 0.1rem;
      }

      .btn-save {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.45rem;
        padding: 0.85rem 1rem;
        background: var(--grad);
        border: none;
        border-radius: 13px;
        color: #fff;
        font-family: "Manrope", sans-serif;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: opacity 0.15s;
      }

      .btn-save:active {
        opacity: 0.82;
      }

      .btn-share {
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--surf);
        border: 1px solid var(--border);
        border-radius: 13px;
        color: var(--accent);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: background 0.15s;
        flex-shrink: 0;
      }

      .btn-share:active {
        background: rgba(69, 191, 229, 0.1);
      }

      /* ── Toast ── */
      .toast {
        position: fixed;
        bottom: 2.5rem;
        left: 50%;
        transform: translateX(-50%) translateY(60px);
        background: rgba(20, 144, 200, 0.95);
        color: #fff;
        font-family: "Manrope", sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        padding: 0.6rem 1.2rem;
        border-radius: 100px;
        white-space: nowrap;
        opacity: 0;
        transition:
          transform 0.26s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.26s;
        z-index: 999;
        pointer-events: none;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      /* ── Desktop: floating card ── */
      @media (min-width: 480px) {
        body {
          overflow: auto;
          align-items: center;
          padding: 2rem 1rem;
        }
        .card {
          height: min(860px, calc(100svh - 4rem));
          max-height: calc(100svh - 4rem);
          border-radius: 28px;
          box-shadow: 0 40px 100px rgba(0, 0, 0, 0.55);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .btn-save,
        .btn-share,
        .contact-row,
        .toast {
          transition: none;
        }
      }
    </style>
  </head>

    <script>
      function showToast(msg) {
        var t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(function () {
          t.classList.remove("show");
        }, 2200);
      }

      function saveContact() {
        var vcf = [
          "BEGIN:VCARD",
          "VERSION:3.0",
          "N:A;Nikhil;;;",
          "FN:Nikhil A",
          "ORG:Tinqbit",
          "TITLE:CEO & Co-Founder",
          "TEL;TYPE=CELL,VOICE:+919995657744",
          "EMAIL;TYPE=WORK:nikhil@tinqbit.com",
          "URL:https://www.linkedin.com/in/nikhil-ajay/",
          "URL:https://tinqbit.com",
          "END:VCARD",
        ].join("\r\n");
        var blob = new Blob([vcf], { type: "text/vcard" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "nikhil-a-tinqbit.vcf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast("Contact saved!");
      }

      function fallbackCopy(text) {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.cssText =
          "position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try {
          document.execCommand("copy");
          showToast("Link copied!");
        } catch (e) {
          showToast("Copy: " + text);
        }
        document.body.removeChild(ta);
      }

      function shareCard() {
        var url = window.location.href;
        if (navigator.share) {
          navigator
            .share({ title: "Nikhil A — CEO, Tinqbit", url: url })
            .catch(function () {});
        } else if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard
            .writeText(url)
            .then(function () {
              showToast("Link copied!");
            })
            .catch(function () {
              fallbackCopy(url);
            });
        } else {
          fallbackCopy(url);
        }
      }
    </script>
